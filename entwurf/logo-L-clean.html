<!DOCTYPE html>
<html lang="de">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<title>MikaTec — L aufgeräumt</title>
<link rel="stylesheet" href="style.css">
<style>
  .lg-grid { display:grid; grid-template-columns:repeat(5,1fr); gap:18px; }
  @media (max-width:860px){ .lg-grid{ grid-template-columns:1fr 1fr; } }
  .opt { background:#0c1a2b; border:1px solid var(--border-soft); border-radius:var(--radius); padding:26px 14px; text-align:center; color:#f3e7c8; }
  .opt img { width:104px; height:104px; }
  .opt .k { font-weight:800; font-size:1.05rem; margin-top:12px; color:#f6e4b0; }
  .opt .d { font-size:.78rem; opacity:.7; margin-top:5px; }
  .opt .wm { margin-top:10px; display:flex; align-items:center; justify-content:center; gap:8px; }
  .opt .wm img { width:26px; height:26px; }
  .opt .wm span { font-weight:700; font-size:.92rem; } .opt .wm b{font-weight:800;}
</style>
</head>
<body>

<header class="nav">
  <div class="wrap nav-inner">
    <a class="logo" href="index.html"><img class="mark" src="logos/mikatec-L.svg" alt="MikaTec-Logo"><span class="name">Mika<b>Tec</b></span></a>
    <nav class="nav-links">
      <a href="index.html" class="start-link">Start</a>
      <a href="leistungen.html">Leistungen</a>
      <a href="projekte.html">Projekte</a>
      <a href="ueber.html">Über mich</a>
      <a href="kontakt.html" class="nav-cta">Anfragen</a>
    </nav>
  </div>
</header>

<main>
  <div class="page wrap">
    <div class="page-head">
      <span class="sec-kicker">Logo L · aufgeräumt</span>
      <h1>Weniger „dazwischen"</h1>
      <p>Links das aktuelle L, dann vier ruhigere Versionen. Sag mir L1, L2, L3 oder L4 — dann tausche ich es überall aus.</p>
    </div>
    <div class="lg-grid" id="grid"></div>
  </div>
</main>

<footer>
  <div class="wrap foot-inner">
    <a class="logo" href="index.html"><img class="mark" src="logos/mikatec-L.svg" alt="MikaTec-Logo"><span class="name">Mika<b>Tec</b></span></a>
    <div>© 2026 MikaTec · Hasan Özel · Deutschland</div>
  </div>
</footer>

<script>
  const ITEMS = [
    {k:'L (aktuell)', f:'L',  d:'Achteck + Scheibe + Stern'},
    {k:'L1', f:'L1', d:'Achteck + Stern (ohne Scheibe)'},
    {k:'L2', f:'L2', d:'Achteck + dünner Ring + Stern'},
    {k:'L3', f:'L3', d:'Nur Ring + Stern (kein Achteck)'},
    {k:'L4', f:'L4', d:'Achteck + kleiner Stern, viel Luft'}
  ];
  const grid=document.getElementById('grid');
  ITEMS.forEach(it=>{
    const f=`logos/mikatec-${it.f}.svg`;
    const o=document.createElement('div'); o.className='opt';
    o.innerHTML=`<img src="${f}"><div class="k">${it.k}</div><div class="d">${it.d}</div>
      <div class="wm"><img src="${f}"><span>Mika<b>Tec</b></span></div>`;
    grid.appendChild(o);
  });
</script>

</body>
</html>
